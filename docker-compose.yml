# Local Postgres for development; app connects as a non-superuser role so RLS applies.
services:
  db:
    image: postgres:16-alpine
    container_name: edtech-doc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edtech_doc_editor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edtech_doc_editor"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
