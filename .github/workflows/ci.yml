name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edtech_doc_editor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      MIGRATION_DATABASE_URL: postgres://postgres:postgres@localhost:5432/edtech_doc_editor
      DATABASE_URL: postgres://app_user:app_password@localhost:5432/edtech_doc_editor
      AUTH_SECRET: ci-secret-not-used-in-production-0000000000=
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
